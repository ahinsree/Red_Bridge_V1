<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Red Circular Background -->
  <circle cx="64" cy="64" r="62" fill="#C2192A" />
  
  <!-- Centered and Scaled White Logo Mark -->
  <g transform="translate(64, 64) scale(0.64) translate(-37, -56)">
    <defs>
      <mask id="circle-cut-mask">
        <!-- White circle represents the full circle area -->
        <circle cx="37" cy="62.5" r="24" fill="white" />
        <!-- Black rectangle subtracts the 13px wide cut at 30 degrees -->
        <rect x="-13" y="56" width="100" height="13" fill="black" transform="rotate(30 37 62.5)" />
      </mask>
    </defs>
    <!-- The Gate: П-form in white -->
    <rect x="0" y="13" width="13" height="99" fill="#FFFFFF" />
    <rect x="61" y="13" width="13" height="99" fill="#FFFFFF" />
    <rect x="0" y="0" width="74" height="13" fill="#FFFFFF" />
    
    <!-- The Sliced Circle in white -->
    <circle cx="37" cy="62.5" r="24" fill="#FFFFFF" mask="url(#circle-cut-mask)" />
  </g>
</svg>
