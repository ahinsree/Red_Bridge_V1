<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(27, 8)">
    <defs>
      <mask id="circle-cut-mask">
        <!-- White circle represents the full circle area -->
        <circle cx="37" cy="62.5" r="24" fill="white" />
        <!-- Black rectangle subtracts the 13px wide cut at 30 degrees -->
        <rect x="-13" y="56" width="100" height="13" fill="black" transform="rotate(30 37 62.5)" />
      </mask>
    </defs>
    <!-- The Gate: П-form -->
    <!-- Left Pillar: width 13, height 99 (from y=13 to y=112) -->
    <rect x="0" y="13" width="13" height="99" fill="#C2192A" />
    <!-- Right Pillar: width 13, height 99 (from y=13 to y=112, starting at x=61) -->
    <rect x="61" y="13" width="13" height="99" fill="#C2192A" />
    <!-- Top Beam: width 74, height 13 (from y=0 to y=13) -->
    <rect x="0" y="0" width="74" height="13" fill="#C2192A" />
    
    <!-- The Sliced Circle: radius 24, centered at (37, 62.5) -->
    <circle cx="37" cy="62.5" r="24" fill="#C2192A" mask="url(#circle-cut-mask)" />
  </g>
</svg>
