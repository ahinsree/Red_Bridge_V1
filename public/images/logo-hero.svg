<svg width="74" height="112" viewBox="0 0 74 112" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow and Glow Filter -->
    <filter id="hero-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feColorMatrix type="matrix" values="
        1 0 0 0 0.76
        0 1 0 0 0.10
        0 0 1 0 0.16
        0 0 0 0.55 0
      " />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Premium Metallic/Glow Gradients -->
    <linearGradient id="gate-grad" x1="37" y1="0" x2="37" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2B43" />
      <stop offset="50%" stop-color="#C2192A" />
      <stop offset="100%" stop-color="#7A0F1A" />
    </linearGradient>
    
    <linearGradient id="circle-grad" x1="13" y1="62.5" x2="61" y2="62.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5E0C14" />
      <stop offset="50%" stop-color="#C2192A" />
      <stop offset="100%" stop-color="#FF3C55" />
    </linearGradient>

    <!-- Mask to slice the circle -->
    <mask id="circle-cut-mask">
      <!-- White circle represents the full circle area -->
      <circle cx="37" cy="62.5" r="24" fill="white" />
      <!-- Black rectangle subtracts the 13px wide cut at 30 degrees -->
      <rect x="-13" y="56" width="100" height="13" fill="black" transform="rotate(30 37 62.5)" />
    </mask>
  </defs>

  <g filter="url(#hero-glow)">
    <!-- The Gate: П-form -->
    <rect x="0" y="13" width="13" height="99" fill="url(#gate-grad)" />
    <rect x="61" y="13" width="13" height="99" fill="url(#gate-grad)" />
    <rect x="0" y="0" width="74" height="13" fill="url(#gate-grad)" />
    
    <!-- The Sliced Circle -->
    <circle cx="37" cy="62.5" r="24" fill="url(#circle-grad)" mask="url(#circle-cut-mask)" />
  </g>
</svg>
